corpus:
    path: "./docs"
    formats: ["md", "txt", "pdf", "html"]

chunking:
    max_tokens: 1024
    overlap_tokens: 64

embeddings:
    provider: "local"
    model: "text-embedding-nomic-embed-text-v1.5"
    base_url: "http://127.0.0.1:1234"
    vector_size: 768

retrieval:
    top_k: 5
    min_score: 0.2

llm:
    provider: "openrouter"
    model: "openrouter/free"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.1
    max_tokens: 1024

