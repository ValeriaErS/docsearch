corpus:
    path: "./docs"
    formats: ["md", "txt"]

chunking:
    max_tokens: 512
    overlap_tokens: 64

embeddings:
    provider: "local"
    model: "simple"
    base_url: ""

retrieval:
    top_k: 5
    min_score: 0.2

llm:
    provider: "mock"
    model: "mock"
    base_url: ""
    temperature: 0.1
    max_tokens: 1024