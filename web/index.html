<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocSearch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: url('https://i.pinimg.com/736x/1f/14/f9/1f14f994d524cdf3feff1c682f23b6ef.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.05));
        }

        header {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .brand {
            color: white;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
        }

        .menu span {
            width: 54px;
            height: 3px;
            background: white;
            border-radius: 30px;
        }

        .side-item {
            position: absolute;
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: white;
            opacity: .65;
        }

        .side-item span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .side-item .line {
            width: 1px;
            height: 70px;
            background: rgba(255, 255, 255, .35);
        }

        .lera { left: 38px; top: 165px; }
        .rag { left: 38px; top: 330px; }
        .ai { left: 245px; bottom: 75px; }

        .glass {
            position: absolute;
            top: 50%;
            left: 37%;
            transform: translate(-50%, -50%);
            width: 640px;
            height: 330px;
            padding: 55px 55px;
            border-radius: 34px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, .14);
            box-shadow: inset 0 1px rgba(255, 255, 255, .15), 0 20px 60px rgba(0, 0, 0, .35);
            text-align: left;
            z-index: 20;
        }

        .glass .site-name {
            font-size: 62px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 18px;
            background: linear-gradient(90deg, #fff, #ffb34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass .title {
            width: 420px;
            font-size: 18px;
            line-height: 31px;
            color: white;
            font-weight: 300;
        }

        .start {
            position: absolute;
            right: 120px;
            top: 56%;
            width: 130px;
            height: 130px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            font-weight: 400;
            color: white;
            background: rgba(255, 255, 255, .18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 0 45px rgba(255, 185, 120, .45), inset 0 1px rgba(255, 255, 255, .2);
            transition: .35s ease;
            z-index: 20;
        }

        .start:hover {
            transform: scale(1.07);
            background: rgba(255, 255, 255, .24);
            box-shadow: 0 0 70px rgba(255, 190, 120, .65), inset 0 1px rgba(255, 255, 255, .3);
        }

        @media (max-width: 1024px) {
            .glass { left: 35%; width: 520px; height: 290px; padding: 40px 40px; }
            .glass .site-name { font-size: 48px; }
            .glass .title { width: 100%; font-size: 16px; line-height: 28px; }
            .start { right: 70px; width: 120px; height: 120px; font-size: 20px; }
            .ai { left: 90px; bottom: 60px; }
        }

        @media (max-width: 768px) {
            body {
                background-image: url('https://i.pinimg.com/1200x/19/80/cd/1980cd2f05ca1aac3e02d569221649af.jpg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }

            .glass {
                left: 50%;
                transform: translate(-50%, -50%);
                width: 92%;
                height: auto;
                padding: 30px 24px;
                text-align: center;
            }

            .glass .site-name { font-size: 36px; }
            .glass .title { width: 100%; font-size: 16px; line-height: 28px; }

            .start {
                right: 50%;
                top: auto;
                bottom: 60px;
                transform: translateX(50%);
                width: 110px;
                height: 110px;
                font-size: 20px;
            }

            .side-item { display: none; }
            .brand { font-size: 18px; }
            .menu span { width: 40px; height: 2px; }
        }

        @media (max-width: 480px) {
            .glass .site-name { font-size: 28px; }
            .glass .title { font-size: 14px; line-height: 24px; }
            .start { width: 90px; height: 90px; font-size: 18px; bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <div class="brand">SearchInform</div>
        <div class="menu">
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="side-item lera"><span>Lera</span><div class="line"></div></div>
    <div class="side-item rag"><span>RAG</span><div class="line"></div></div>
    <div class="side-item ai"><span>AI</span><div class="line"></div></div>

    <div class="glass">
        <div class="site-name">DocSearch</div>
        <div class="title">Ваш интеллектуальный поиск <br>по корпоративной документации</div>
    </div>

    <button class="start" id="startBtn">Начать</button>

    <script>
        
        const startBtn = document.getElementById("startBtn");

        startBtn.addEventListener("click", function() {
            window.location.href = "/chat.html";
        });
    </script>

</body>
</html>
